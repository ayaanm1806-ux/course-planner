<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Planner</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f8;
    }

    header {
      background: #111;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      max-width: 800px;
      margin: 30px auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    input, button {
      padding: 10px;
      margin: 5px 0;
      width: 100%;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    button {
      background: #111;
      color: white;
      cursor: pointer;
      border: none;
    }

    button:hover {
      background: #333;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #f9f9f9;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .delete {
      background: red;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .small {
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

<header>📚 Student Planner</header>

<div class="container">

  <!-- ADD TASK -->
  <div class="card">
    <h3>Add Assignment</h3>
    <input type="text" id="taskInput" placeholder="Enter assignment (e.g. Math HW Chapter 3)" />
    <input type="date" id="dateInput" />
    <button onclick="addTask()">Add Task</button>
  </div>

  <!-- TASK LIST -->
  <div class="card">
    <h3>Your Tasks</h3>
    <ul id="taskList"></ul>
  </div>

</div>

<script>
  let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

  function saveTasks() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
  }

  function renderTasks() {
    const list = document.getElementById("taskList");
    list.innerHTML = "";

    tasks.forEach((task, index) => {
      const li = document.createElement("li");

      li.innerHTML = `
        <div>
          <strong>${task.text}</strong><br>
          <span class="small">Due: ${task.date || "No date"}</span>
        </div>
        <button class="delete" onclick="deleteTask(${index})">X</button>
      `;

      list.appendChild(li);
    });
  }

  function addTask() {
    const text = document.getElementById("taskInput").value;
    const date = document.getElementById("dateInput").value;

    if (!text) {
      alert("Please enter a task!");
      return;
    }

    tasks.push({ text, date });
    saveTasks();
    renderTasks();

    document.getElementById("taskInput").value = "";
    document.getElementById("dateInput").value = "";
  }

  function deleteTask(index) {
    tasks.splice(index, 1);
    saveTasks();
    renderTasks();
  }

  renderTasks();
</script>

</body>
</html>
