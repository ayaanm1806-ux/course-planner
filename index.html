<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Course Planner</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    margin: 0;
    padding: 40px;
}

.container {
    max-width: 700px;
    margin: auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0,0,0,0.1);
}

h1 {
    text-align: center;
}

label {
    display: block;
    margin-top: 15px;
    font-weight: bold;
}

select, button {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    margin-top: 20px;
    background: #2563eb;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}

#results {
    margin-top: 25px;
    padding: 15px;
    background: #eef4ff;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h1>📚 Student Course Planner</h1>

    <label>Grade Level</label>
    <select id="grade">
        <option>9th Grade</option>
        <option>10th Grade</option>
        <option>11th Grade</option>
        <option>12th Grade</option>
    </select>

    <label>Career Interest</label>
    <select id="career">
        <option>Finance</option>
        <option>Computer Science</option>
        <option>Engineering</option>
        <option>Medicine</option>
    </select>

    <button onclick="generatePlan()">
        Generate My Plan
    </button>

    <div id="results"></div>
</div>

<script>
function generatePlan() {

    const career = document.getElementById("career").value;

    const plans = {
        Finance: [
            "AP Statistics",
            "AP Calculus AB",
            "AP Macroeconomics",
            "Investment Club",
            "Wharton Investment Competition"
        ],

        "Computer Science": [
            "AP Computer Science A",
            "AP Calculus BC",
            "Cybersecurity Club",
            "Coding Projects",
            "Hackathons"
        ],

        Engineering: [
            "AP Physics 1",
            "AP Calculus BC",
            "Engineering Club",
            "Robotics",
            "STEM Competitions"
        ],

        Medicine: [
            "AP Biology",
            "AP Chemistry",
            "Hospital Volunteering",
            "Health Science Club",
            "Medical Shadowing"
        ]
    };

    let output = `
        <h2>Recommended Path: ${career}</h2>
        <ul>
    `;

    plans[career].forEach(item => {
        output += `<li>${item}</li>`;
    });

    output += "</ul>";

    document.getElementById("results").innerHTML = output;
}
</script>

</body>
</html>
